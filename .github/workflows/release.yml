name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to build & deploy. Defaults to manual-<sha>.'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  meta:
    name: resolve-tag
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      image_owner: ${{ steps.resolve.outputs.image_owner }}
    steps:
      - id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="manual-${GITHUB_SHA::7}"
          fi
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image_owner=$OWNER_LC" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG (owner: $OWNER_LC)"

  build-api:
    name: build & push api
    needs: meta
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ needs.meta.outputs.image_owner }}/${{ github.event.repository.name }}-api:${{ needs.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ needs.meta.outputs.image_owner }}/${{ github.event.repository.name }}-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-web:
    name: build & push web
    needs: meta
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./web/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_LIFF_ID=${{ secrets.NEXT_PUBLIC_LIFF_ID }}
            NEXT_PUBLIC_DEV_LINE_USER_ID=${{ secrets.NEXT_PUBLIC_DEV_LINE_USER_ID }}
          tags: |
            ${{ env.REGISTRY }}/${{ needs.meta.outputs.image_owner }}/${{ github.event.repository.name }}-web:${{ needs.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ needs.meta.outputs.image_owner }}/${{ github.event.repository.name }}-web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    name: deploy to droplet
    needs: [meta, build-api, build-web]
    runs-on: ubuntu-24.04
    if: github.event_name == 'push'
    steps:
      - name: SSH into droplet & roll out
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.meta.outputs.tag }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER || 'root' }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE_TAG
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/promkep-tutra

            if grep -q '^IMAGE_TAG=' .env; then
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" .env
            else
              echo "IMAGE_TAG=${IMAGE_TAG}" >> .env
            fi

            docker compose pull
            docker compose up -d
            docker image prune -f
